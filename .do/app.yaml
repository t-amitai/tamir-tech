name: tamir-tech
region: nyc
domains:
  - domain: tamir.tech
    type: PRIMARY
services:
  - name: web
    github:
      repo: t-amitai/tamir-tech
      branch: main
      deploy_on_push: false  # We handle deploys via GitHub Actions
    build_command: npm install && npm run build && pip install -r requirements.txt
    run_command: gunicorn server.app:app --workers 2 --threads 2 --worker-class gthread --timeout 30
    environment_slug: python
    http_port: 8000
    envs:
      - key: RESUME_PASSWORD_HASH
        type: SECRET
      - key: RESUME_KEY
        type: SECRET
      - key: GOOGLE_CLIENT_ID
        type: SECRET
      - key: GOOGLE_CLIENT_SECRET
        type: SECRET
      - key: GOOGLE_REFRESH_TOKEN
        type: SECRET
